<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamandaré Express</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#0077cc">
</head>
<body>
<header>
    <h1>Tamandaré Express</h1>
    <p>Verifique horários e compre sua passagem</p>
</header>

<main>
    <!-- Seleção de destino e data -->
    <section id="search-section">
        <label for="destino">Destino:</label>
        <select id="destino">
            <option value="">Selecione o destino</option>
            <option value="recife">Recife, PE - Dantas Barreto</option>
            <option value="olinda">Olinda, PE</option>
            <option value="joao-pessoa">João Pessoa, PB</option>
        </select>

        <label for="data-viagem">Data:</label>
        <input type="date" id="data-viagem">

        <button onclick="buscarHorarios()">Buscar horários</button>
    </section>

    <!-- Tabela de horários disponíveis -->
    <section id="horarios-section" style="display:none;">
        <h2>Horários disponíveis</h2>
        <table id="horarios-table">
            <thead>
                <tr>
                    <th>Horário</th>
                    <th>Duração</th>
                    <th>Tipo</th>
                    <th>Preço</th>
                    <th>Comprar</th>
                </tr>
            </thead>
            <tbody>
                <!-- Linhas geradas pelo JS -->
            </tbody>
        </table>
    </section>
</main>

<script src="js/script.js"></script>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('../service/service-worker.js')
        .then(() => console.log('Service Worker registrado!'))
        .catch(err => console.log('Erro SW:', err));
}
</script>
</body>
</html>
